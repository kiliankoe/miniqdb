services:
  pocketbase:
    build:
      context: ./pocketbase
    ports:
      - "8090:8090"
    volumes:
      - pb_data:/pb/pb_data
    environment:
      - ALLOWED_DOMAINS=${ALLOWED_DOMAINS:-}
      - ADMIN_EMAILS=${ADMIN_EMAILS:-}
      # SMTP (optional): when SMTP_HOST is set, mail is configured on startup.
      # Otherwise configure it in the PocketBase admin UI instead.
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_TLS=${SMTP_TLS:-false}
      - SMTP_SENDER_ADDRESS=${SMTP_SENDER_ADDRESS:-}
      - SMTP_SENDER_NAME=${SMTP_SENDER_NAME:-}
    restart: unless-stopped

  frontend:
    build:
      context: .
    ports:
      - "8080:80"
    depends_on:
      - pocketbase
    environment:
      - POCKETBASE_URL=http://pocketbase:8090
      - APP_NAME=${APP_NAME:-miniqdb}
      - LOGIN_BUTTON_TEXT=${LOGIN_BUTTON_TEXT:-Login}
      - NOTHING_TO_SEE_HERE_BUTTON_TEXT=${NOTHING_TO_SEE_HERE_BUTTON_TEXT:-}

volumes:
  pb_data:
